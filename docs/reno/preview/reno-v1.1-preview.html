<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReNo v1.1 — Assessment (preview)</title>
<style>
:root{
  --navy:#050C2E; --navy-2:#0B1A56; --blue:#2244E0; --blue-soft:#6A85F0;
  --blue-tint:#DCE2FF; --violet:#8A5CD6; --coral:#FF5A5A; --orange:#FF7A3D;
  --orange-hot:#FF9540; --gold:#FFC074; --gold-tint:#FFF0D6;
  --ax1:#2244E0; --ax2:#6A85F0; --ax3:#8A5CD6; --ax4:#FF7A3D; --ax5:#FF5A5A;
  --paper:#F6F1EA; --paper-2:#EDE7DC; --paper-3:#E4DCCF;
  --ink:#0E1230; --ink-soft:#4F5470; --ink-mute:#8A8FA8;
  --line:#E0D9CE; --line-dark:#C8C0B4;
  --font-display:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-sans:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --r-xs:8px; --r-sm:12px; --r-md:18px; --r-lg:26px; --r-xl:36px; --r-full:999px;
  --grad-coral:linear-gradient(135deg,var(--coral),var(--orange));
  --grad-blue:linear-gradient(95deg,var(--blue),var(--blue-soft));
  --grad-axis:linear-gradient(90deg,var(--ax1),var(--ax2),var(--ax3),var(--ax4),var(--ax5));
  --grad-hero:linear-gradient(140deg,#040924 0%,#0D1E6A 35%,#3D1E5A 60%,#A83040 80%,#FF7030 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5;}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}

/* layout */
.wrap{max-width:760px;margin:0 auto;padding:0 22px}
.stage-wrap{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(246,241,234,.85);
  backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--line)}
.topbar .row{max-width:760px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:16px}
.brand{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);
  font-weight:800;letter-spacing:-.03em;font-size:18px;color:var(--ink)}
.brand .mk{width:26px;height:26px;flex:none}
.brand i{font-style:normal;color:var(--orange)}
.spacer{flex:1}
.langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-full);overflow:hidden;background:#fff}
.langtoggle button{padding:6px 13px;font-size:12px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em}
.langtoggle button.on{background:var(--ink);color:#fff}
.progressbar{height:3px;background:var(--paper-3)}
.progressbar .fill{height:100%;background:var(--grad-coral);transition:width .35s cubic-bezier(.4,0,.2,1);border-radius:0 3px 3px 0}

.stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:56px 0}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-mute);margin-bottom:14px}
h1{font-family:var(--font-display);font-weight:800;letter-spacing:-.035em;font-size:clamp(30px,5vw,44px);line-height:1.05}
h2{font-family:var(--font-display);font-weight:750;letter-spacing:-.03em;font-size:26px;line-height:1.12}
.lede{color:var(--ink-soft);font-size:17px;margin-top:16px;max-width:56ch}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:30px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:var(--r-full);
  background:var(--ink);color:#fff;font-weight:650;font-size:15px;letter-spacing:.01em;transition:transform .12s,opacity .12s}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.grad{background:var(--grad-coral)}
.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
.btn[disabled]{opacity:.4;pointer-events:none}
.btnrow{display:flex;gap:12px;align-items:center;margin-top:30px;flex-wrap:wrap}

/* consent */
.check{display:flex;gap:13px;align-items:flex-start;padding:18px;border:1px solid var(--line);
  border-radius:var(--r-md);background:var(--paper);cursor:pointer;margin-top:24px}
.check input{margin-top:2px;width:20px;height:20px;accent-color:var(--orange);flex:none;cursor:pointer}
.check span{font-size:15px;color:var(--ink)}
.err{color:var(--coral);font-size:14px;margin-top:12px;font-weight:600;min-height:18px}

/* intake */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px 18px;margin-top:26px}
.field{display:flex;flex-direction:column;gap:7px}
.field.full{grid-column:1/-1}
.field label{font-size:13px;font-weight:600;color:var(--ink-soft);letter-spacing:.01em}
.field input,.field select{padding:12px 14px;border:1px solid var(--line);border-radius:var(--r-sm);
  background:#fff;font-size:15px;color:var(--ink);width:100%}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue-soft);box-shadow:0 0 0 3px var(--blue-tint)}
.note{color:var(--ink-mute);font-size:13.5px;margin-top:14px}

/* test */
.qcount{font-family:var(--font-mono);font-size:12px;letter-spacing:.1em;color:var(--ink-mute);text-transform:uppercase}
.qaxis{display:inline-flex;align-items:center;gap:8px;margin-top:18px;font-family:var(--font-mono);
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
.qaxis .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.qtext{font-family:var(--font-display);font-weight:700;letter-spacing:-.025em;
  font-size:clamp(22px,3.6vw,30px);line-height:1.2;margin:14px 0 34px}
.likert{display:flex;flex-direction:column;gap:10px}
.lk{display:flex;align-items:center;gap:16px;width:100%;padding:16px 20px;border:1.5px solid var(--line);
  border-radius:var(--r-md);background:#fff;text-align:left;transition:border-color .12s,background .12s,transform .1s}
.lk:hover{border-color:var(--blue-soft);transform:translateX(2px)}
.lk.sel{border-color:transparent;background:var(--ink);color:#fff}
.lk .dotnum{width:30px;height:30px;flex:none;border-radius:50%;border:2px solid var(--line-dark);
  display:grid;place-items:center;font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink-mute)}
.lk.sel .dotnum{border-color:rgba(255,255,255,.5);color:#fff}
.lk .lktext{font-size:16px;font-weight:600}
.lk .agree{margin-left:auto;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink-mute)}
.lk.sel .agree{color:rgba(255,255,255,.6)}
.testnav{display:flex;justify-content:space-between;align-items:center;margin-top:30px}
.linkbtn{font-size:14px;font-weight:600;color:var(--ink-soft)}
.linkbtn[disabled]{opacity:.3;pointer-events:none}

/* results */
.res-hero{background:var(--grad-hero);border-radius:var(--r-xl);padding:40px 34px;color:#fff;overflow:hidden;position:relative}
.res-hero .eyebrow{color:rgba(255,255,255,.6)}
.res-type{font-family:var(--font-display);font-weight:800;letter-spacing:-.04em;font-size:clamp(44px,9vw,78px);line-height:1;margin:6px 0}
.res-type span{color:var(--gold)}
.sig-inline{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-mono);font-weight:600;
  font-size:15px;letter-spacing:.04em;flex-wrap:wrap}
.sig-inline .dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.4)}
.radar-stage{display:grid;place-items:center;margin:6px 0}
.sig-code{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap;margin-top:6px}
.sig-slot{flex:1;min-width:96px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);
  padding:16px 12px 13px;text-align:center;position:relative;overflow:hidden}
.sig-slot::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--ax)}
.sig-slot.balanced::before{background:var(--line-dark)}
.sig-slot .ss-axis{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute)}
.sig-slot .ss-code{font-family:var(--font-display);font-weight:800;letter-spacing:-.03em;margin-top:6px}
.sig-slot .ss-code b{font-size:34px;color:var(--ink)}
.sig-slot .ss-code span{font-size:20px;color:var(--ax);font-weight:700}
.sig-slot.balanced .ss-code span{color:var(--ink-mute)}
.sig-slot .ss-pole{font-size:11px;color:var(--ink-soft);margin-top:8px;font-weight:600}
.axcard{border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;background:#fff;margin-top:16px}
.axcard .axhead{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.axcard .axswatch{width:44px;height:44px;border-radius:var(--r-sm);flex:none;display:grid;place-items:center;
  color:#fff;font-family:var(--font-display);font-weight:800;font-size:20px}
.axcard .axname{font-family:var(--font-display);font-weight:750;letter-spacing:-.02em;font-size:19px}
.axcard .axmeta{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;color:var(--ink-mute);margin-top:2px}
.axbar{height:12px;border-radius:var(--r-full);background:var(--paper-2);position:relative;margin:16px 0 6px;overflow:hidden}
.axbar .mid{position:absolute;left:50%;top:-3px;bottom:-3px;width:1.5px;background:var(--line-dark)}
.axbar .fillpos{position:absolute;top:0;bottom:0;border-radius:var(--r-full)}
.axpoles{display:flex;justify-content:space-between;font-size:11px;font-family:var(--font-mono);
  letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute)}
.axpoles b{color:var(--ink-soft)}
.axdesc{font-size:15px;color:var(--ink);margin-top:14px;line-height:1.55}
.axframing{font-size:13.5px;color:var(--ink-soft);margin-top:10px;padding-left:14px;border-left:3px solid var(--line);font-style:italic}
.disc{font-size:13px;color:var(--ink-mute);margin-top:34px;padding-top:22px;border-top:1px solid var(--line);line-height:1.6}

/* quick-fill dev button */
.devfill{position:fixed;right:16px;bottom:16px;z-index:50;background:var(--ink);color:#fff;
  border-radius:var(--r-full);padding:11px 17px;font-size:13px;font-weight:650;letter-spacing:.01em;
  box-shadow:0 8px 24px rgba(0,0,0,.22);display:inline-flex;gap:8px;align-items:center;opacity:.9}
.devfill:hover{opacity:1}
.devnote{position:fixed;left:16px;bottom:16px;z-index:50;font-family:var(--font-mono);font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);background:rgba(246,241,234,.8);
  padding:6px 10px;border-radius:var(--r-full);border:1px solid var(--line)}

@media(max-width:560px){
  .grid2{grid-template-columns:1fr}
  .stage{padding:36px 0}
  .card{padding:22px}
  .res-hero{padding:28px 22px}
}
</style>
</head>
<body>
<div id="app"></div>

<script id="reno-data" type="application/json">{"questions":[{"id":"Q001","axis":"EO","pole":"O","reverse":false,"text":{"en":"After a party or large gathering, I leave with more energy than when I arrived.","ru":"После вечеринки или большого собрания я ухожу с большей энергией, чем пришёл(а)."}},{"id":"Q002","axis":"EO","pole":"O","reverse":false,"text":{"en":"I work out my ideas by talking them through with someone.","ru":"Я додумываю свои идеи, проговаривая их с кем-нибудь."}},{"id":"Q003","axis":"EO","pole":"O","reverse":false,"text":{"en":"In a group discussion, I speak up early without waiting to be asked.","ru":"В групповом обсуждении я высказываюсь одним из первых, не дожидаясь, пока меня спросят."}},{"id":"Q004","axis":"EO","pole":"O","reverse":false,"text":{"en":"I strike up conversations with strangers — in a queue, on a plane — without needing a special reason.","ru":"Я завожу разговор с незнакомыми людьми — в очереди, в самолёте — без особого повода."}},{"id":"Q005","axis":"EO","pole":"O","reverse":false,"text":{"en":"When something good happens to me, my first impulse is to tell someone right away.","ru":"Когда со мной происходит что-то хорошее, первым делом мне хочется сразу кому-то рассказать."}},{"id":"Q006","axis":"EO","pole":"O","reverse":false,"text":{"en":"After a long day alone, I look for a reason to call or meet someone.","ru":"После целого дня в одиночестве я ищу повод позвонить кому-нибудь или встретиться."}},{"id":"Q007","axis":"EO","pole":"O","reverse":false,"text":{"en":"I start answering a question right away, shaping my thought as I speak.","ru":"Я начинаю отвечать на вопрос сразу, формулируя мысль по ходу речи."}},{"id":"Q008","axis":"EO","pole":"O","reverse":false,"text":{"en":"Given the choice, I work or study in a lively place — a café or shared room — rather than in silence.","ru":"При возможности я работаю или учусь в оживлённом месте — в кафе или общем помещении, а не в тишине."}},{"id":"Q009","axis":"EO","pole":"O","reverse":false,"text":{"en":"At meetings, I volunteer to speak or present.","ru":"На собраниях я сам(а) вызываюсь выступить или представить результат."}},{"id":"Q010","axis":"EO","pole":"O","reverse":false,"text":{"en":"I plan my weekends around get-togethers with groups of people.","ru":"Я планирую выходные вокруг встреч с компанией."}},{"id":"Q011","axis":"EO","pole":"W","reverse":true,"text":{"en":"After a few hours in company, I need time alone before I can do anything else.","ru":"После нескольких часов в компании мне нужно побыть одному(ой), прежде чем браться за что-то ещё."}},{"id":"Q012","axis":"EO","pole":"W","reverse":true,"text":{"en":"I rehearse what I am going to say in my head before saying it aloud.","ru":"Я проговариваю про себя то, что собираюсь сказать, прежде чем произнести вслух."}},{"id":"Q013","axis":"EO","pole":"W","reverse":true,"text":{"en":"I sometimes let a call go unanswered so I can prepare before calling back.","ru":"Иногда я не беру трубку, чтобы подготовиться и перезвонить позже."}},{"id":"Q014","axis":"EO","pole":"W","reverse":true,"text":{"en":"When facing a difficult problem, I first work it out alone in a quiet place, and only then discuss it.","ru":"Столкнувшись со сложной задачей, я сначала обдумываю её в тишине наедине с собой и лишь потом обсуждаю."}},{"id":"Q015","axis":"EO","pole":"W","reverse":true,"text":{"en":"In conversation, I let others finish and often keep my reaction to myself.","ru":"В разговоре я даю другим договорить и часто оставляю свою реакцию при себе."}},{"id":"Q016","axis":"EO","pole":"W","reverse":true,"text":{"en":"I keep a new idea to myself until it is fully formed.","ru":"Я держу новую идею при себе, пока она полностью не сформируется."}},{"id":"Q017","axis":"EO","pole":"W","reverse":true,"text":{"en":"At big events, I find one person for a quiet conversation at the edge of the room.","ru":"На больших мероприятиях я нахожу одного собеседника для спокойного разговора в стороне."}},{"id":"Q018","axis":"EO","pole":"W","reverse":true,"text":{"en":"I turn down invitations because I would rather spend the evening by myself.","ru":"Я отказываюсь от приглашений, потому что предпочитаю провести вечер наедине с собой."}},{"id":"Q019","axis":"EO","pole":"W","reverse":true,"text":{"en":"When asked a question, I pause to think before answering.","ru":"Когда мне задают вопрос, я беру паузу, чтобы подумать, прежде чем ответить."}},{"id":"Q020","axis":"IF","pole":"C","reverse":false,"text":{"en":"When assembling something new, I follow the written instructions step by step.","ru":"Собирая что-то новое, я следую инструкции шаг за шагом."}},{"id":"Q021","axis":"IF","pole":"C","reverse":false,"text":{"en":"When someone explains an idea, I ask for a concrete example before accepting it.","ru":"Когда мне объясняют идею, я прошу конкретный пример, прежде чем принять её."}},{"id":"Q022","axis":"IF","pole":"C","reverse":false,"text":{"en":"I remember exact facts from what I read — dates, prices, names.","ru":"Я запоминаю из прочитанного точные факты — даты, цены, имена."}},{"id":"Q023","axis":"IF","pole":"C","reverse":false,"text":{"en":"When describing an event, I recount what actually happened, in order and with specifics.","ru":"Описывая событие, я передаю, что именно произошло, — по порядку и с подробностями."}},{"id":"Q024","axis":"IF","pole":"C","reverse":false,"text":{"en":"When buying, I compare exact specifications rather than general impressions.","ru":"При покупке я сравниваю точные характеристики, а не общее впечатление."}},{"id":"Q025","axis":"IF","pole":"C","reverse":false,"text":{"en":"I prefer tasks with a clear, proven method over tasks that require inventing an approach.","ru":"Я предпочитаю задачи с понятным проверенным методом задачам, где подход нужно придумывать."}},{"id":"Q026","axis":"IF","pole":"C","reverse":false,"text":{"en":"When planning a trip, I focus on the practical details — schedules, costs, distances.","ru":"Планируя поездку, я сосредотачиваюсь на практических деталях — расписании, ценах, расстояниях."}},{"id":"Q027","axis":"IF","pole":"C","reverse":false,"text":{"en":"I judge a proposal mainly by whether it has already worked somewhere.","ru":"Я оцениваю предложение прежде всего по тому, сработало ли оно уже где-то."}},{"id":"Q028","axis":"IF","pole":"C","reverse":false,"text":{"en":"I do my best work on tasks where the requirements are spelled out precisely.","ru":"Лучше всего мне удаются задачи, где требования прописаны точно."}},{"id":"Q029","axis":"IF","pole":"C","reverse":false,"text":{"en":"In a book or article, I skip the theory and look for the practical takeaway.","ru":"В книге или статье я пропускаю теорию и ищу практический вывод."}},{"id":"Q030","axis":"IF","pole":"A","reverse":true,"text":{"en":"When I learn a new fact, I immediately fit it into a bigger pattern or idea.","ru":"Узнав новый факт, я сразу встраиваю его в более общую закономерность или идею."}},{"id":"Q031","axis":"IF","pole":"A","reverse":true,"text":{"en":"I catch myself imagining how things could be, rather than noting how they are.","ru":"Я ловлю себя на том, что представляю, каким всё могло бы быть, а не отмечаю, как есть."}},{"id":"Q032","axis":"IF","pole":"A","reverse":true,"text":{"en":"In conversation, I drift from what is happening now to future possibilities.","ru":"В разговоре я перехожу от того, что происходит сейчас, к будущим возможностям."}},{"id":"Q033","axis":"IF","pole":"A","reverse":true,"text":{"en":"A new idea can absorb me more than the practical task in front of me.","ru":"Новая идея может увлечь меня сильнее, чем практическая задача передо мной."}},{"id":"Q034","axis":"IF","pole":"A","reverse":true,"text":{"en":"I invent my own way of solving a problem even when a standard one exists.","ru":"Я придумываю собственный способ решения, даже когда существует стандартный."}},{"id":"Q035","axis":"IF","pole":"A","reverse":true,"text":{"en":"I explain things through images, metaphors, and analogies.","ru":"Я объясняю через образы, метафоры и аналогии."}},{"id":"Q036","axis":"IF","pole":"A","reverse":true,"text":{"en":"Untested, new ways of doing things attract me more than proven ones.","ru":"Новые, непроверенные способы привлекают меня больше, чем проверенные."}},{"id":"Q037","axis":"IF","pole":"A","reverse":true,"text":{"en":"I notice connections between things that seem unrelated to others.","ru":"Я замечаю связи между вещами, которые другим кажутся не связанными."}},{"id":"Q038","axis":"IF","pole":"A","reverse":true,"text":{"en":"After a film or book, I think more about its meaning than about the details of the plot.","ru":"После фильма или книги я думаю больше о смысле, чем о деталях сюжета."}},{"id":"Q039","axis":"DB","pole":"L","reverse":false,"text":{"en":"When deciding, I weigh the pros and cons and follow the conclusion, even if it upsets someone.","ru":"Принимая решение, я взвешиваю «за» и «против» и следую выводу, даже если кого-то это расстроит."}},{"id":"Q040","axis":"DB","pole":"L","reverse":false,"text":{"en":"In a discussion, I directly point out flaws in the other person's reasoning.","ru":"В споре я прямо указываю на слабые места в рассуждениях собеседника."}},{"id":"Q041","axis":"DB","pole":"L","reverse":false,"text":{"en":"I give honest critical feedback even when I know it will disappoint.","ru":"Я даю честную критическую обратную связь, даже если знаю, что она огорчит."}},{"id":"Q042","axis":"DB","pole":"L","reverse":false,"text":{"en":"When two people disagree, I judge who is right by the facts, not by who is more upset.","ru":"Когда двое спорят, я сужу, кто прав, по фактам, а не по тому, кто сильнее расстроен."}},{"id":"Q043","axis":"DB","pole":"L","reverse":false,"text":{"en":"I convince people with evidence and reasoning rather than appeals to feelings.","ru":"Я убеждаю доказательствами и логикой, а не обращением к чувствам."}},{"id":"Q044","axis":"DB","pole":"L","reverse":false,"text":{"en":"If a rule is fair, I apply it even to a close friend.","ru":"Если правило справедливо, я применяю его даже к близкому другу."}},{"id":"Q045","axis":"DB","pole":"L","reverse":false,"text":{"en":"I prefer an uncomfortable truth to a comforting version of events.","ru":"Я предпочту неприятную правду утешительной версии событий."}},{"id":"Q046","axis":"DB","pole":"L","reverse":false,"text":{"en":"In group decisions, I argue for the objectively strongest option even against the group's mood.","ru":"В групповых решениях я отстаиваю объективно лучший вариант, даже вопреки настроению группы."}},{"id":"Q047","axis":"DB","pole":"L","reverse":false,"text":{"en":"I evaluate a person's work on its merits, separately from my relationship with them.","ru":"Я оцениваю работу человека по её качеству, отдельно от моих отношений с ним."}},{"id":"Q048","axis":"DB","pole":"L","reverse":false,"text":{"en":"I question the logic of a claim even when it comes from someone I like.","ru":"Я проверяю логику утверждения, даже если его высказал симпатичный мне человек."}},{"id":"Q049","axis":"DB","pole":"V","reverse":true,"text":{"en":"Before deciding, I first think through how each option will affect the people involved.","ru":"Прежде чем решить, я сначала продумываю, как каждый вариант отразится на людях."}},{"id":"Q050","axis":"DB","pole":"V","reverse":true,"text":{"en":"I soften critical feedback so the person is not hurt.","ru":"Я смягчаю критику, чтобы не задеть человека."}},{"id":"Q051","axis":"DB","pole":"V","reverse":true,"text":{"en":"I go along with a group decision I privately disagree with, to preserve the peace.","ru":"Я соглашаюсь с решением группы, с которым внутренне не согласен(на), ради мира."}},{"id":"Q052","axis":"DB","pole":"V","reverse":true,"text":{"en":"When someone shares a problem, I comfort them first and analyze later.","ru":"Когда со мной делятся проблемой, я сначала утешаю и только потом анализирую."}},{"id":"Q053","axis":"DB","pole":"V","reverse":true,"text":{"en":"I make exceptions to rules when applying them would hurt someone.","ru":"Я делаю исключения из правил, если их применение причинит кому-то боль."}},{"id":"Q054","axis":"DB","pole":"V","reverse":true,"text":{"en":"In a debate, I sense the emotional temperature of the room before I weigh the arguments.","ru":"В дискуссии я улавливаю эмоциональную атмосферу раньше, чем взвешиваю аргументы."}},{"id":"Q055","axis":"DB","pole":"V","reverse":true,"text":{"en":"I change my plans to fit what matters to the people close to me.","ru":"Я меняю свои планы ради того, что важно близким."}},{"id":"Q056","axis":"DB","pole":"V","reverse":true,"text":{"en":"I persuade by connecting to what a person cares about, not by proving them wrong.","ru":"Я убеждаю, опираясь на то, что дорого человеку, а не доказывая его неправоту."}},{"id":"Q057","axis":"DB","pole":"V","reverse":true,"text":{"en":"Choosing between the \"correct\" option and the one that keeps harmony, I choose harmony.","ru":"Выбирая между «правильным» вариантом и тем, что сохранит согласие, я выбираю согласие."}},{"id":"Q058","axis":"SP","pole":"D","reverse":false,"text":{"en":"I keep a to-do list and actually cross items off.","ru":"Я веду список дел и действительно вычёркиваю выполненное."}},{"id":"Q059","axis":"SP","pole":"D","reverse":false,"text":{"en":"I finish tasks well before the deadline.","ru":"Я заканчиваю дела задолго до срока."}},{"id":"Q060","axis":"SP","pole":"D","reverse":false,"text":{"en":"I plan my week in advance and mostly follow the plan.","ru":"Я планирую неделю заранее и в основном следую плану."}},{"id":"Q061","axis":"SP","pole":"D","reverse":false,"text":{"en":"Before starting work, I put my workspace in order.","ru":"Прежде чем начать работу, я навожу порядок на рабочем месте."}},{"id":"Q062","axis":"SP","pole":"D","reverse":false,"text":{"en":"I completely finish one task before starting the next.","ru":"Я полностью завершаю одно дело, прежде чем взяться за следующее."}},{"id":"Q063","axis":"SP","pole":"D","reverse":false,"text":{"en":"When traveling, I book tickets and lodging well in advance.","ru":"В поездках я бронирую билеты и жильё заранее."}},{"id":"Q064","axis":"SP","pole":"D","reverse":false,"text":{"en":"When plans change suddenly, I immediately build a new plan rather than acting ad hoc.","ru":"Если планы внезапно меняются, я сразу выстраиваю новый план, а не действую по обстоятельствам."}},{"id":"Q065","axis":"SP","pole":"D","reverse":false,"text":{"en":"My files, papers, and belongings each have their fixed place.","ru":"У моих файлов, бумаг и вещей есть своё постоянное место."}},{"id":"Q066","axis":"SP","pole":"D","reverse":false,"text":{"en":"I keep a fixed daily routine.","ru":"Я придерживаюсь постоянного распорядка дня."}},{"id":"Q067","axis":"SP","pole":"D","reverse":false,"text":{"en":"Once a decision is made, I close the question and do not reopen it.","ru":"Приняв решение, я закрываю вопрос и не возвращаюсь к нему."}},{"id":"Q068","axis":"SP","pole":"F","reverse":true,"text":{"en":"I decide what to do with my day as it unfolds.","ru":"Я решаю, чем заняться, по ходу дня."}},{"id":"Q069","axis":"SP","pole":"F","reverse":true,"text":{"en":"I work in bursts of inspiration rather than on a schedule.","ru":"Я работаю рывками по вдохновению, а не по расписанию."}},{"id":"Q070","axis":"SP","pole":"F","reverse":true,"text":{"en":"My best work happens close to the deadline.","ru":"Лучше всего мне работается ближе к дедлайну."}},{"id":"Q071","axis":"SP","pole":"F","reverse":true,"text":{"en":"I start new projects before finishing old ones.","ru":"Я начинаю новые дела, не закончив старых."}},{"id":"Q072","axis":"SP","pole":"F","reverse":true,"text":{"en":"I keep plans loose so I can change them if something better comes up.","ru":"Я оставляю планы гибкими, чтобы поменять их, если подвернётся что-то лучше."}},{"id":"Q073","axis":"SP","pole":"F","reverse":true,"text":{"en":"My workspace has piles that make sense only to me.","ru":"На моём рабочем месте — стопки, понятные только мне."}},{"id":"Q074","axis":"SP","pole":"F","reverse":true,"text":{"en":"I put off final decisions to keep my options open longer.","ru":"Я откладываю окончательные решения, чтобы дольше сохранять варианты."}},{"id":"Q075","axis":"SP","pole":"F","reverse":true,"text":{"en":"When traveling, I prefer to sort things out on the spot rather than book everything ahead.","ru":"В путешествиях я предпочитаю разбираться на месте, а не бронировать всё заранее."}},{"id":"Q076","axis":"SP","pole":"F","reverse":true,"text":{"en":"I drop a plan midway if a more interesting path appears.","ru":"Я бросаю план на середине, если появляется более интересный путь."}},{"id":"Q077","axis":"ER","pole":"S","reverse":false,"text":{"en":"After an unpleasant conversation, I return to my usual state within minutes.","ru":"После неприятного разговора я возвращаюсь в обычное состояние за считанные минуты."}},{"id":"Q078","axis":"ER","pole":"S","reverse":false,"text":{"en":"Bad news rarely changes how I spend the rest of the day.","ru":"Плохие новости редко меняют то, как я провожу остаток дня."}},{"id":"Q079","axis":"ER","pole":"S","reverse":false,"text":{"en":"Under time pressure, I keep working at my normal pace.","ru":"В цейтноте я продолжаю работать в своём обычном темпе."}},{"id":"Q080","axis":"ER","pole":"S","reverse":false,"text":{"en":"I can listen to criticism of my work and get back to it within the hour.","ru":"Я могу выслушать критику своей работы и вернуться к ней в течение часа."}},{"id":"Q081","axis":"ER","pole":"S","reverse":false,"text":{"en":"My mood stays roughly level through the week, regardless of events.","ru":"Моё настроение остаётся ровным всю неделю, независимо от событий."}},{"id":"Q082","axis":"ER","pole":"S","reverse":false,"text":{"en":"When something breaks or falls through, I go straight to fixing it without dwelling on it.","ru":"Когда что-то ломается или срывается, я сразу перехожу к исправлению, не пережёвывая случившееся."}},{"id":"Q083","axis":"ER","pole":"S","reverse":false,"text":{"en":"Waiting for important results does not affect my sleep.","ru":"Ожидание важных результатов не влияет на мой сон."}},{"id":"Q084","axis":"ER","pole":"S","reverse":false,"text":{"en":"A sudden change of plans doesn't knock me off track — I adjust and continue.","ru":"Внезапная смена планов не выбивает меня из колеи — я перестраиваюсь и продолжаю."}},{"id":"Q085","axis":"ER","pole":"S","reverse":false,"text":{"en":"In a heated argument, my voice and pace stay the same as in a calm conversation.","ru":"В жарком споре мой голос и темп остаются такими же, как в спокойной беседе."}},{"id":"Q086","axis":"ER","pole":"R","reverse":true,"text":{"en":"After a conflict, I replay it in my head for hours or even days.","ru":"После конфликта я прокручиваю его в голове часами, а то и днями."}},{"id":"Q087","axis":"ER","pole":"R","reverse":true,"text":{"en":"A small setback can color my whole day.","ru":"Небольшая неудача может окрасить весь мой день."}},{"id":"Q088","axis":"ER","pole":"R","reverse":true,"text":{"en":"I feel events in my body — racing heart, tight stomach — before I've fully processed them.","ru":"Я ощущаю события телом — учащённое сердцебиение, сжатие в животе — раньше, чем успеваю их осмыслить."}},{"id":"Q089","axis":"ER","pole":"R","reverse":true,"text":{"en":"My mood can shift noticeably several times in one day.","ru":"Моё настроение может заметно меняться несколько раз за день."}},{"id":"Q090","axis":"ER","pole":"R","reverse":true,"text":{"en":"Criticism stays with me long after the conversation is over.","ru":"Критика остаётся со мной надолго после окончания разговора."}},{"id":"Q091","axis":"ER","pole":"R","reverse":true,"text":{"en":"Before important events, I sleep worse than usual.","ru":"Перед важными событиями я сплю хуже обычного."}},{"id":"Q092","axis":"ER","pole":"R","reverse":true,"text":{"en":"A stray remark can occupy my thoughts for the rest of the evening.","ru":"Случайное замечание может занимать мои мысли весь вечер."}},{"id":"Q093","axis":"ER","pole":"R","reverse":true,"text":{"en":"A touching film or piece of music can move me to tears.","ru":"Трогательный фильм или музыка могут довести меня до слёз."}},{"id":"Q094","axis":"ER","pole":"R","reverse":true,"text":{"en":"When stakes are high, I check and re-check — sent messages, locked doors, submitted work.","ru":"Когда ставки высоки, я проверяю и перепроверяю — отправленные сообщения, закрытые двери, сданную работу."}}],"answerKey":{"EO":[{"code":"O5","band":5,"pole":"O","posMin":90.0,"posMax":100.0,"en":"Almost always energized by people and expression; forms thoughts out loud, in real time; arranges life around interaction and can feel flat in prolonged quiet.","ru":"Почти всегда заряжается от общения и активности, обдумывает вслух по ходу разговора, выстраивает жизнь вокруг взаимодействия; в долгой тишине теряет тонус.","framing":{"en":"Frame as energy, not attention-seeking — can still be a thoughtful listener.","ru":"Подавать как источник энергии, а не желание быть в центре — может быть и внимательным слушателем."}},{"code":"O4","band":4,"pole":"O","posMin":80.0,"posMax":90.0,"en":"Thinks best in dialogue, seeks group settings, moves quickly from thought to speech, initiates easily; uses solitude briefly and functionally.","ru":"Лучше всего думает в диалоге, тянется к компаниям, быстро переходит от мысли к слову, легко проявляет инициативу; уединение использует коротко и по делу.","framing":{"en":"","ru":""}},{"code":"O3","band":3,"pole":"O","posMin":70.0,"posMax":80.0,"en":"Speaks early in discussions, shares reactions readily, recharges through contact; long stretches alone can drain.","ru":"Высказывается одним из первых, охотно делится реакциями, восстанавливается через общение; долгое одиночество утомляет.","framing":{"en":"","ru":""}},{"code":"O2","band":2,"pole":"O","posMin":60.0,"posMax":70.0,"en":"Often works out ideas by talking, gravitates to livelier settings, reaches out when the day has been too quiet; still values downtime.","ru":"Часто продумывает идеи вслух, выбирает более оживлённые места, ищет общения, если день был слишком тихим; при этом ценит и паузы.","framing":{"en":"","ru":""}},{"code":"O1","band":1,"pole":"O","posMin":52.5,"posMax":60.0,"en":"Enjoys company and thinks a little better talking things through, but is equally at home alone; speaks up without a strong pull to be first.","ru":"Любит компанию и чуть лучше думает, проговаривая, но не менее комфортно и один; высказывается без сильного стремления быть первым.","framing":{"en":"","ru":""}},{"code":"—","band":0,"pole":"0","posMin":47.5,"posMax":52.5,"en":"Draws energy from both people and solitude, shifting by context; can lead a discussion or work quietly alone without either draining them.","ru":"Черпает энергию и из общения, и из уединения, переключаясь по ситуации; может и вести обсуждение, и спокойно работать в одиночку.","framing":{"en":"A real result — name the flexibility as a strength.","ru":"Полноценный результат — подавать гибкость как сильную сторону."}},{"code":"W1","band":1,"pole":"W","posMin":40.0,"posMax":47.5,"en":"Comfortable in company but recovers best with a little solitude, and tends to form a thought before voicing it; participates readily.","ru":"В компании комфортно, но лучше восстанавливается в тишине и обычно сначала формулирует мысль, потом говорит; участвует охотно.","framing":{"en":"","ru":""}},{"code":"W2","band":2,"pole":"W","posMin":30.0,"posMax":40.0,"en":"Prefers to think before speaking, keeps a reaction private until formed, needs some alone time to reset; engages selectively — depth over breadth.","ru":"Предпочитает подумать перед ответом, держит реакцию при себе до готовности, берёт паузу на восстановление; общается избирательно — глубина важнее охвата.","framing":{"en":"","ru":""}},{"code":"W3","band":3,"pole":"W","posMin":20.0,"posMax":30.0,"en":"Rehearses thoughts internally, speaks after others, solves problems alone before sharing; large gatherings are manageable but costly.","ru":"Обдумывает про себя, высказывается после других, решает задачи в одиночку, а затем выносит на обсуждение; большие собрания посильны, но затратны.","framing":{"en":"","ru":""}},{"code":"W4","band":4,"pole":"W","posMin":10.0,"posMax":20.0,"en":"Processes almost entirely internally, guards new ideas until ready, protects solitary focus; at events gravitates to one quiet conversation.","ru":"Обрабатывает почти всё внутри, придерживает идеи до готовности, оберегает время для сосредоточенной работы; на мероприятиях выбирает один спокойный разговор.","framing":{"en":"","ru":""}},{"code":"W5","band":5,"pole":"W","posMin":0.0,"posMax":10.0,"en":"Energy comes almost entirely from solitude and reflection; extended contact depletes and needs recovery; shares sparingly, only when fully formed.","ru":"Энергия почти целиком из уединения и размышлений; долгое общение истощает и требует восстановления; делится скупо и только тем, что созрело.","framing":{"en":"Separate from shyness — can be warm and capable, and simply runs on quiet.","ru":"Отделять от застенчивости — может быть тёплым и умелым, просто набирает силы в тишине."}}],"IF":[{"code":"C5","band":5,"pole":"C","posMin":90.0,"posMax":100.0,"en":"Attention goes to facts, specifics, and direct experience; starts a task without long deliberation; prefers proven step-by-step methods and takes things literally; drawn to traditional, established ways.","ru":"Внимание — к фактам, деталям и прямому опыту; берётся за дело без долгих раздумий; предпочитает проверенные пошаговые методы, понимает буквально; тяготеет к традиционным, устоявшимся подходам.","framing":{"en":"Not a ceiling on ability — this is where practical mastery and reliability come from.","ru":"Не потолок способностей — отсюда практическое мастерство и надёжность."}},{"code":"C4","band":4,"pole":"C","posMin":80.0,"posMax":90.0,"en":"Works from facts and clear detail, likes tactical tasks with a tangible result, wants precise instructions; reads things literally and trusts what has already worked.","ru":"Опирается на факты и точные детали, любит тактические задачи с ощутимым результатом, просит чёткие инструкции; понимает буквально и доверяет тому, что уже сработало.","framing":{"en":"","ru":""}},{"code":"C3","band":3,"pole":"C","posMin":70.0,"posMax":80.0,"en":"Prefers precise questions and answers, focuses on doing over pondering, likes short concrete tasks; values facts over theories.","ru":"Предпочитает точные вопросы и ответы, склонен делать, а не рассуждать, любит короткие конкретные задачи; факты важнее теорий.","framing":{"en":"","ru":""}},{"code":"C2","band":2,"pole":"C","posMin":60.0,"posMax":70.0,"en":"Leans practical and factual; comfortable with detail and proven methods, but will engage a new idea if its use is clear.","ru":"Склонен к практике и фактам; уверенно работает с деталями и проверенными методами, но откликнется на новую идею, если ясна её польза.","framing":{"en":"","ru":""}},{"code":"C1","band":1,"pole":"C","posMin":52.5,"posMax":60.0,"en":"Trusts facts and direct experience a little more than theory, but moves comfortably between detail and the bigger picture.","ru":"Чуть больше доверяет фактам и прямому опыту, чем теории, но свободно переключается между деталями и общей картиной.","framing":{"en":"","ru":""}},{"code":"—","band":0,"pole":"0","posMin":47.5,"posMax":52.5,"en":"Moves fluidly between concrete fact and abstract pattern, using whichever the situation calls for; can ground an idea in specifics and step back to see its meaning.","ru":"Свободно переходит от конкретных фактов к общим закономерностям, выбирая нужное по ситуации; может и опереться на детали, и увидеть общий смысл.","framing":{"en":"A real result — name the range as an asset.","ru":"Полноценный результат — подавать широту как достоинство."}},{"code":"A1","band":1,"pole":"A","posMin":40.0,"posMax":47.5,"en":"Drawn slightly more to patterns and meaning than to raw detail, but keeps a practical footing and notices connections.","ru":"Чуть больше тянется к закономерностям и смыслу, чем к деталям, но сохраняет практичность и замечает связи.","framing":{"en":"","ru":""}},{"code":"A2","band":2,"pole":"A","posMin":30.0,"posMax":40.0,"en":"Fits new facts into a bigger idea, enjoys imagining how things could be, drawn to novel approaches — while still able to attend to detail.","ru":"Встраивает новые факты в общую идею, любит представлять, как могло бы быть, тянется к новым подходам — но при необходимости внимателен к деталям.","framing":{"en":"","ru":""}},{"code":"A3","band":3,"pole":"A","posMin":20.0,"posMax":30.0,"en":"Thinks in patterns and meaning, prefers strategic tasks and the big picture, works comfortably amid uncertainty; looks for a deeper sense in things.","ru":"Мыслит закономерностями и смыслами, предпочитает стратегические задачи и общую картину, спокойно работает в неопределённости; ищет глубинный смысл.","framing":{"en":"","ru":""}},{"code":"A4","band":4,"pole":"A","posMin":10.0,"posMax":20.0,"en":"Trusts ideas over particulars, prefers strategic work and keeps a clear vision of the whole, often bends given instructions toward a better way; drawn to the untested and new.","ru":"Доверяет идеям больше, чем частностям, предпочитает стратегическую работу и удерживает видение целого, нередко отступает от инструкций ради лучшего пути; тянется к новому и непроверенному.","framing":{"en":"","ru":""}},{"code":"A5","band":5,"pole":"A","posMin":0.0,"posMax":10.0,"en":"Lives in patterns, meanings, and what-could-be; explores ideas at length, wants freedom from fixed rules, and looks for deeper meaning everywhere; an inventor and reformer.","ru":"Живёт закономерностями, смыслами и возможностями; подолгу исследует идеи, стремится к свободе от жёстких правил, во всём ищет глубокий смысл; новатор и изобретатель.","framing":{"en":"Not impracticality as a flaw — this is where innovation and foresight come from; pairs well with concrete collaborators.","ru":"Не «непрактичность», а источник новаторства и дальновидности; хорошо дополняется людьми практического склада."}}],"DB":[{"code":"L5","band":5,"pole":"L","posMin":90.0,"posMax":100.0,"en":"Decides through argument, facts, and objective analysis, and follows the conclusion even at emotional cost; keeps a given word, takes on hard decisions, and does not retract a considered position.","ru":"Решает через аргументы, факты и объективный анализ и следует выводу даже ценой чувств; держит слово, берёт на себя трудные решения и не отступает от взвешенной позиции.","framing":{"en":"Not coldness — this is where clear, fair, defensible judgment comes from; the person can care deeply and still decide by logic.","ru":"Не «холодность» — отсюда ясные, справедливые, обоснованные решения; можно глубоко переживать и всё же решать логикой."}},{"code":"L4","band":4,"pole":"L","posMin":80.0,"posMax":90.0,"en":"Wins points with facts and reasoning rather than persuasion, keeps assessments objective, organizes work well, and prefers to rely on themselves.","ru":"Добивается своего фактами и доводами, а не уговорами, сохраняет объективность оценок, хорошо организует работу и предпочитает опираться на себя.","framing":{"en":"","ru":""}},{"code":"L3","band":3,"pole":"L","posMin":70.0,"posMax":80.0,"en":"Argues from evidence, is proud of objective decisions, and will enter a useful disagreement when it serves the task.","ru":"Опирается на доказательства, гордится объективностью решений и готов на полезный спор, если это помогает делу.","framing":{"en":"","ru":""}},{"code":"L2","band":2,"pole":"L","posMin":60.0,"posMax":70.0,"en":"Finds it easier to get results through arguments and facts than through emotions; assessments are mostly objective, with room for people's stakes.","ru":"Легче добивается результата доводами и фактами, чем эмоциями; оценки в основном объективны, но учитывает, что важно людям.","framing":{"en":"","ru":""}},{"code":"L1","band":1,"pole":"L","posMin":52.5,"posMax":60.0,"en":"Reasons toward decisions and can achieve more with facts than appeals, but readily adjusts when something clearly matters to someone.","ru":"Идёт к решению через рассуждение и достигает большего фактами, чем эмоциями, но легко корректируется, если что-то явно важно человеку.","framing":{"en":"","ru":""}},{"code":"—","band":0,"pole":"0","posMin":47.5,"posMax":52.5,"en":"Combines argument with feeling and weighs both the logic of a decision and its impact on people, choosing objectively or with care as the situation calls for.","ru":"Сочетает доводы с чувствами и взвешивает и логику решения, и его влияние на людей, решая объективно или бережно — по ситуации.","framing":{"en":"A real result — name the dual sensitivity as a strength.","ru":"Полноценный результат — подавать двойную чуткость как силу."}},{"code":"V1","band":1,"pole":"V","posMin":40.0,"posMax":47.5,"en":"Considers impact on people a little before the cold calculation, but keeps the reasoning in view.","ru":"Чуть раньше думает о влиянии на людей, чем о холодном расчёте, но не упускает и логику.","framing":{"en":"","ru":""}},{"code":"V2","band":2,"pole":"V","posMin":30.0,"posMax":40.0,"en":"Reaches goals more through rapport and persuasion than debate; decisions often weigh the feelings of those affected.","ru":"Добивается целей скорее через расположение и уговоры, чем спор; в решениях часто учитывает чувства затронутых людей.","framing":{"en":"","ru":""}},{"code":"V3","band":3,"pole":"V","posMin":20.0,"posMax":30.0,"en":"Decisions are often values-based and considerate of others; strong at social communication and smoothing things over, and prefers agreement to conflict.","ru":"Решения нередко опираются на ценности и учитывают окружающих; силён в общении и сглаживании, предпочитает согласие спору.","framing":{"en":"","ru":""}},{"code":"V4","band":4,"pole":"V","posMin":10.0,"posMax":20.0,"en":"Leads with empathy and relationships, senses who needs support, and works to resolve tension even if it slows the task; flexible with commitments to keep goodwill.","ru":"Опирается на чуткость и отношения, чувствует, кому нужна поддержка, и стремится снять напряжение, даже если это замедляет дело; гибок в обещаниях ради добрых отношений.","framing":{"en":"","ru":""}},{"code":"V5","band":5,"pole":"V","posMin":0.0,"posMax":10.0,"en":"Decides above all by people and values, seeking to honour everyone's feelings and keep relationships whole; avoids conflict and quickly yields a point to spare someone's feelings.","ru":"Решает прежде всего по людям и ценностям, стремясь учесть чувства всех и сохранить отношения; избегает конфликтов и быстро уступает, чтобы кого-то не задеть.","framing":{"en":"Not irrationality — this is where empathy, loyalty, and cohesion come from; pairs with logic-led input on high-stakes technical calls.","ru":"Не «нелогичность», а источник эмпатии, преданности и сплочённости; дополняется логикой в ответственных технических решениях."}}],"SP":[{"code":"D5","band":5,"pole":"D","posMin":90.0,"posMax":100.0,"en":"Keeps order in things, papers, and plans; seems to schedule life to the minute and is thrown by a broken plan; finishes what is started and is strongly punctual.","ru":"Держит порядок в вещах, бумагах и делах; будто расписывает жизнь по минутам и сбивается, если план нарушен; доводит начатое до конца и подчёркнуто пунктуален.","framing":{"en":"Not rigidity as a fault — this is where reliability and dependable delivery come from.","ru":"Не «жёсткость», а источник надёжности и предсказуемого результата."}},{"code":"D4","band":4,"pole":"D","posMin":80.0,"posMax":90.0,"en":"Plans work in advance and dislikes deviating from it, finishes the current task before starting the next, keeps a fixed routine, and is punctual.","ru":"Планирует работу заранее и не любит отклонений, сначала завершает текущее дело, потом берётся за новое, держит распорядок и пунктуален.","framing":{"en":"","ru":""}},{"code":"D3","band":3,"pole":"D","posMin":70.0,"posMax":80.0,"en":"Keeps order in things and tasks, plans ahead, does things now rather than later, and finishes before beginning something new.","ru":"Поддерживает порядок в делах и вещах, планирует наперёд, делает сразу, а не потом, и завершает, прежде чем начать новое.","framing":{"en":"","ru":""}},{"code":"D2","band":2,"pole":"D","posMin":60.0,"posMax":70.0,"en":"Likes working to a plan because it lifts productivity, dislikes putting tasks off, and prefers finishing to starting.","ru":"Любит работать по плану, это повышает продуктивность, не любит откладывать и предпочитает завершать, а не начинать.","framing":{"en":"","ru":""}},{"code":"D1","band":1,"pole":"D","posMin":52.5,"posMax":60.0,"en":"Given the choice, leans toward order and planning over improvising, and prefers to arrive on time.","ru":"При выборе склоняется к порядку и плану, а не к импровизации, и предпочитает приходить вовремя.","framing":{"en":"","ru":""}},{"code":"—","band":0,"pole":"0","posMin":47.5,"posMax":52.5,"en":"Comfortable with both order and spontaneity; can work to a plan or freely, likes starting and finishing about equally, and is usually on time.","ru":"Спокойно относится и к порядку, и к спонтанности; может работать по плану и свободно, начинать и завершать любит примерно поровну, обычно приходит вовремя.","framing":{"en":"A real result — name the adaptability as a strength.","ru":"Полноценный результат — подавать адаптивность как силу."}},{"code":"F1","band":1,"pole":"F","posMin":40.0,"posMax":47.5,"en":"Given the choice, leans toward free work over a fixed plan and isn't troubled by arriving a little late.","ru":"При выборе предпочитает свободную работу заранее заданному плану и не переживает, если немного опоздает.","framing":{"en":"","ru":""}},{"code":"F2","band":2,"pole":"F","posMin":30.0,"posMax":40.0,"en":"Dislikes working strictly to plan as it limits freedom, tends to postpone tasks, and prefers starting to finishing.","ru":"Не любит работать строго по плану — это ограничивает свободу, склонен откладывать и предпочитает начинать, а не завершать.","framing":{"en":"","ru":""}},{"code":"F3","band":3,"pole":"F","posMin":20.0,"posMax":30.0,"en":"Doesn't plan far ahead, waiting to see what's really needed; often works at the last minute, and likes starting more than finishing.","ru":"Не планирует заранее, предпочитая посмотреть, что действительно понадобится; часто делает в последнюю минуту и любит начинать больше, чем завершать.","framing":{"en":"","ru":""}},{"code":"F4","band":4,"pole":"F","posMin":10.0,"posMax":20.0,"en":"A creative disorder in things and tasks, prefers doing what feels right in the moment, may run past deadlines waiting for a second wind, and juggles many open tasks.","ru":"В делах и вещах — творческий беспорядок, предпочитает делать то, что нужно сейчас, может выходить за сроки в ожидании второго дыхания и держит много начатых дел.","framing":{"en":"","ru":""}},{"code":"F5","band":5,"pole":"F","posMin":0.0,"posMax":10.0,"en":"Order gives way to spontaneity; lives in the moment and finds schedules confining, does things at the last minute, and often leaves tasks open as new ones appear.","ru":"Порядок уступает спонтанности; живёт моментом, расписания тяготят, делает в последнюю минуту и часто не доводит дела до конца, увлекаясь новыми.","framing":{"en":"Not disorganization as a flaw — this is where improvisation and comfort with uncertainty come from; pairs with structure-minded support on long deadlines.","ru":"Не «неорганизованность», а источник импровизации и спокойствия в неопределённости; дополняется людьми организованного склада на длинных сроках."}}],"ER":[{"code":"S5","band":5,"pole":"S","posMin":90.0,"posMax":100.0,"en":"Stays composed even in a crisis and keeps a level mood regardless of events; controls emotions and can work in almost any state — very hard to knock off balance.","ru":"Сохраняет спокойствие даже в кризис и держит ровное настроение независимо от событий; владеет эмоциями и работает почти в любом состоянии — вывести из равновесия крайне сложно.","framing":{"en":"Not detachment or absence of feeling — this is where composure, resilience, and steadiness-for-others come from.","ru":"Не «бесчувственность», а источник хладнокровия, устойчивости и опоры для других."}},{"code":"S4","band":4,"pole":"S","posMin":80.0,"posMax":90.0,"en":"Makes decisions without being swept up by emotion, needs a real reason for a mood to shift, and can work through poor physical or emotional states.","ru":"Принимает решения, не поддаваясь эмоциям, для смены настроения нужна веская причина, может работать и в неважном состоянии.","framing":{"en":"","ru":""}},{"code":"S3","band":3,"pole":"S","posMin":70.0,"posMax":80.0,"en":"Stays calm and contained where others lose composure, with an even working capacity across the day.","ru":"Остаётся спокойным и собранным там, где другие теряют самообладание, с ровной работоспособностью в течение дня.","framing":{"en":"","ru":""}},{"code":"S2","band":2,"pole":"S","posMin":60.0,"posMax":70.0,"en":"Fairly calm in tense moments and generally emotionally steady, with occasional stronger reactions to what matters most.","ru":"Достаточно спокоен в напряжённые моменты и в целом эмоционально ровен, с редкими более сильными реакциями на самое важное.","framing":{"en":"","ru":""}},{"code":"S1","band":1,"pole":"S","posMin":52.5,"posMax":60.0,"en":"Usually calm under pressure; mood doesn't swing much across the day and rarely drives performance.","ru":"Обычно спокоен под давлением; настроение за день меняется мало и почти не влияет на работоспособность.","framing":{"en":"","ru":""}},{"code":"—","band":0,"pole":"0","posMin":47.5,"posMax":52.5,"en":"Feels events with normal intensity and recovers at a normal pace — no major mood swings through the day, responsive without being derailed.","ru":"Откликается на события с обычной силой и восстанавливается в обычном темпе — без резких перепадов за день, отзывчив, но не выбит из колеи.","framing":{"en":"A healthy, common middle — describe as emotionally typical and adaptable.","ru":"Здоровая, распространённая середина — описывать как эмоционально типичного и гибкого."}},{"code":"R1","band":1,"pole":"R","posMin":40.0,"posMax":47.5,"en":"Feels events a little more keenly and takes a bit longer to settle, without being easily overwhelmed.","ru":"Чуть острее переживает события и дольше успокаивается, но не теряется легко.","framing":{"en":"","ru":""}},{"code":"R2","band":2,"pole":"R","posMin":30.0,"posMax":40.0,"en":"Cannot stay entirely cool in tense moments; mood and working capacity shift somewhat through the day, and feelings run fairly deep.","ru":"Не может оставаться полностью хладнокровным в напряжённые моменты; настроение и работоспособность за день немного колеблются, а чувства довольно глубоки.","framing":{"en":"","ru":""}},{"code":"R3","band":3,"pole":"R","posMin":20.0,"posMax":30.0,"en":"Openly shows feeling under stress; mood can change several times a day, and works best on an emotional upswing.","ru":"Открыто проявляет чувства в напряжении; настроение может меняться несколько раз в день, лучше всего работает на эмоциональном подъёме.","framing":{"en":"Describe as attunement and depth of feeling, not fragility.","ru":"Описывать как чуткость и глубину чувств, а не хрупкость."}},{"code":"R4","band":4,"pole":"R","posMin":10.0,"posMax":20.0,"en":"Visibly stirred in critical moments; mood shifts noticeably and carries working capacity with it, with strong peaks of inspiration.","ru":"Заметно волнуется в критические моменты; настроение ощутимо меняется и тянет за собой работоспособность, с яркими пиками вдохновения.","framing":{"en":"This is where empathy and expressive depth come from; benefits from reassurance and supportive structure.","ru":"Отсюда эмпатия и выразительная глубина; помогает поддержка и мягкая опора."}},{"code":"R5","band":5,"pole":"R","posMin":0.0,"posMax":10.0,"en":"Responds to events with great intensity; mood can turn several times a day — highly effective on an upswing, drained in a dip — and feels things vividly and deeply.","ru":"Откликается на события очень сильно; настроение может меняться несколько раз в день — на подъёме очень продуктивен, в спаде тяжело — и переживает ярко и глубоко.","framing":{"en":"MOST wording-sensitive cell. Describe as high sensitivity and depth of feeling — NEVER instability or disorder. For a child: 'feels deeply, benefits from gentle support and reassurance.'","ru":"Самая деликатная ячейка. Описывать как высокую чувствительность и глубину — НИКОГДА как нестабильность. Для ребёнка: «глубоко чувствует, важна мягкая поддержка и ободрение»."}}]}}</script>
<script>
(function(){

  {code:'EO',index:1,name:{en:'Energy Orientation',ru:'Ориентация энергии'},

   plus:{letter:'S',label:{en:'Steady',ru:'Устойчивость'}},minus:{letter:'R',label:{en:'Sensitive',ru:'Чувствительность'}},color:'#FF5A5A',excludeFromType:true},
];
const AXIS_BY = Object.fromEntries(AXES.map(a=>[a.code,a]));

/* ---- copy (ported from src/app/reno/page.tsx) ---- */
const T = {
  en:{

/* ---- interleave questions so axes don't clump ---- */
function interleave(qs){
  const byAxis={}; AXES.forEach(a=>byAxis[a.code]=[]);
  qs.forEach(q=>{ if(byAxis[q.axis]) byAxis[q.axis].push(q); });
  const order=[]; let more=true, i=0;
  while(more){ more=false;
    for(const a of AXES){ const list=byAxis[a.code]; if(i<list.length){ order.push(list[i]); more=true; } }
    i++;
  }
  return order;
}
const ORDER = interleave(QUESTIONS);

/* ---- scoring (ReNo v1.1 — QuestionBank §05) ---- */
function scoreAxis(code, responses){
  const items = QUESTIONS.filter(q=>q.axis===code);
  let sum=0, n=0;
  for(const q of items){
    const r = responses[q.id];
    if(r==null) continue;
    const v = q.reverse ? (5-r)/4 : (r-1)/4;   // 0..1 toward plus pole
    sum+=v; n++;
  }
  const X = n? (sum/n)*100 : 50;               // 0..100
  const intensity = Math.abs(X-50)*2;          // 0..100
  const cells = KEY[code].slice().sort((a,b)=>b.posMin-a.posMin);
  let cell = cells.find(c=>X>=c.posMin) || cells[cells.length-1];
  return { code, X, intensity, cell, answered:n, total:items.length };
}
function scoreAll(responses){
  const axes = AXES.map(a=>scoreAxis(a.code,responses));
  const byCode = Object.fromEntries(axes.map(s=>[s.code,s]));
  const type = AXES.filter(a=>!a.excludeFromType)
    .map(a=>{ const X=byCode[a.code].X; return X>=50?a.plus.letter:a.minus.letter; }).join('');
  const signature = axes.map(s=>s.cell.code==='—'
      ? '·' : s.cell.code).join(' · ');
  return { axes, byCode, type, signature };
}

/* ---- state ---- */
let lang = 'en';
let stage = 'disclaimer';        // disclaimer|consent|intake|test|results
let consent = false, consentErr = false;
let intake = {};
let qi = 0;                      // current question index in ORDER
const responses = {};           // id -> 1..5
const app = document.getElementById('app');
const tr = ()=>T[lang];

function setLang(l){ lang=l; render(); }
function go(s){ stage=s; window.scrollTo(0,0); render(); }

/* ---- svg brand mark (constellation pentagon) ---- */
function markSVG(){
  const pts=[]; for(let k=0;k<5;k++){const ang=(-90+k*72)*Math.PI/180; pts.push([50+40*Math.cos(ang),50+40*Math.sin(ang)]);}
  const poly=pts.map(p=>p.join(',')).join(' ');
  let dots=pts.map((p,k)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="7" fill="var(--ax${k+1})"/>`).join('');
  return `<svg viewBox="0 0 100 100" class="mk"><polygon points="${poly}" fill="none" stroke="currentColor" stroke-opacity=".28" stroke-width="2"/>${dots}</svg>`;
}

/* ---- radar ---- */
function radar(axes){
  const R=118, CX=150, CY=140, N=5;
  const ang=k=>(-90+k*72)*Math.PI/180;
  const pt=(k,rad)=>[CX+rad*Math.cos(ang(k)), CY+rad*Math.sin(ang(k))];
  let rings='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const p=[]; for(let k=0;k<N;k++){const[x,y]=pt(k,R*f);p.push(x.toFixed(1)+','+y.toFixed(1));}
    rings+=`<polygon points="${p.join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  });
  let spokes='',labels='',dots='';
  const dataPts=[];
  axes.forEach((s,k)=>{
    const a=AXIS_BY[s.code];
    const[ex,ey]=pt(k,R);
    spokes+=`<line x1="${CX}" y1="${CY}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
    const rad=R*(s.intensity/100);
    const[dx,dy]=pt(k,rad);
    dataPts.push([dx,dy]);
    dots+=`<circle cx="${dx.toFixed(1)}" cy="${dy.toFixed(1)}" r="4.5" fill="${a.color}"/>`;
    const[lx,ly]=pt(k,R+22);
    const anchor = Math.abs(lx-CX)<6?'middle':(lx>CX?'start':'end');
    labels+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" `
      +`font-family="var(--font-mono)" font-size="12" font-weight="700" fill="${a.color}">${s.cell.code==='—'?a.code:s.cell.code}</text>`;
  });
  const dpoly=dataPts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  return `<svg viewBox="0 0 300 300" width="300" height="300" class="radar" role="img" aria-label="ReNo radar">
    ${rings}${spokes}
    <polygon points="${dpoly}" fill="rgba(34,68,224,.12)" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round"/>
    ${dots}${labels}
  </svg>`;
}

/* ---- render helpers ---- */
function topbar(showProgress){
  let pct=0;
  if(showProgress){ pct = Math.round((Object.keys(responses).length/QUESTIONS.length)*100); }
  return `<div class="topbar">
    <div class="row">
      <span class="brand">${markSVG()}Psy<i>ID</i></span>
      <span class="spacer"></span>
      <span class="langtoggle">
        <button class="${lang==='en'?'on':''}" data-lang="en">EN</button>
        <button class="${lang==='ru'?'on':''}" data-lang="ru">RU</button>
      </span>
    </div>
    ${showProgress?`<div class="progressbar"><div class="fill" style="width:${pct}%"></div></div>`:''}
  </div>`;
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---- stages ---- */
function viewDisclaimer(){
  const t=tr();
  return `${topbar(false)}<div class="stage-wrap"><div class="wrap stage">
    <div class="eyebrow">${t.disclaimer_eyebrow}</div>
    <h1>${t.disclaimer_heading}</h1>
    <p class="lede">${t.disclaimer_body}</p>
    <div class="btnrow"><button class="btn grad" data-go="consent">${t.btn_continue}</button></div>
  </div></div>`;
}
function viewConsent(){
  const t=tr();
  return `${topbar(false)}<div class="stage-wrap"><div class="wrap stage">
    <div class="eyebrow">${t.consent_eyebrow}</div>
    <h1>${t.consent_heading}</h1>
    <p class="lede">${t.consent_body}</p>
    <label class="check"><input type="checkbox" id="consent" ${consent?'checked':''}><span>${t.consent_check}</span></label>
    <div class="err">${consentErr?t.consent_err:''}</div>
    <div class="btnrow"><button class="btn grad" data-consent-continue>${t.btn_continue}</button></div>
  </div></div>`;
}
function selField(key,label){
  const t=tr(); const opts=OPTS[key][lang];
  const cur=intake[key]||'';
  return `<div class="field"><label>${label}</label><select data-intake="${key}">
    <option value="">${t.intake_select_ph}</option>
    ${opts.map(o=>`<option ${cur===o?'selected':''}>${esc(o)}</option>`).join('')}
  </select></div>`;
}
function viewIntake(){
  const t=tr();
  return `${topbar(false)}<div class="stage-wrap"><div class="wrap stage">
    <div class="eyebrow">${t.intake_eyebrow}</div>
    <h1>${t.intake_heading}</h1>
    <p class="note">${t.intake_note}</p>
    <div class="grid2">
      <div class="field"><label>${t.intake_age}</label><input type="number" min="16" max="99" placeholder="${t.intake_age_ph}" data-intake="age" value="${intake.age||''}"></div>
      ${selField('sex',t.intake_sex)}
      <div class="field"><label>${t.intake_country}</label><input data-intake="country" value="${esc(intake.country||'')}"></div>
      <div class="field"><label>${t.intake_native_language}</label><input data-intake="native" value="${esc(intake.native||'')}"></div>
      ${selField('education',t.intake_education)}
      ${selField('employment',t.intake_employment)}
      <div class="field full"><label>${t.intake_occupation}</label><input placeholder="${t.intake_occupation_ph}" data-intake="occupation" value="${esc(intake.occupation||'')}"></div>
      ${selField('relationship',t.intake_relationship)}
    </div>
    <div class="btnrow">
      <button class="btn grad" data-go="test">${t.intake_begin}</button>
      <button class="btn ghost" data-go="test">${t.intake_skip}</button>
    </div>
  </div></div>`;
}
function viewTest(){
  const t=tr();
  const q=ORDER[qi]; const a=AXIS_BY[q.axis];
  const cur=responses[q.id];
  const rows=[1,2,3,4,5].map(r=>{
    const sel=cur===r?'sel':'';
    return `<button class="lk ${sel}" data-answer="${r}">
      <span class="dotnum">${r}</span>
      <span class="lktext">${t.scale[r-1]}</span>
    </button>`;
  }).join('');
  return `${topbar(true)}<div class="stage-wrap"><div class="wrap stage">
    <div class="qcount">${qi+1} ${t.test_of} ${ORDER.length}</div>
    <div class="qaxis"><span class="dot" style="background:${a.color}"></span>${a.name[lang]}</div>
    <div class="qtext">${esc(q.text[lang])}</div>
    <div class="likert">${rows}</div>
    <div class="testnav">
      <button class="linkbtn" data-nav="-1" ${qi===0?'disabled':''}>${t.test_back}</button>
      ${qi===ORDER.length-1
        ? `<button class="btn grad" data-finish ${cur==null?'disabled':''}>${t.test_finish}</button>`
        : `<button class="linkbtn" data-nav="1" ${cur==null?'disabled':''}>${t.test_next}</button>`}
    </div>
  </div></div>`;
}
function viewResults(){
  const t=tr(); const S=scoreAll(responses);
  const typeHtml = esc(S.type);
  const sigInline = S.axes.map(s=>{
    const code=s.cell.code==='—'?'—':s.cell.code;
    return `<span>${code}</span>`;
  }).join('<span class="dot"></span>');
  const slots = S.axes.map((s,k)=>{
    const a=AXIS_BY[s.code]; const bal=s.cell.pole==='0';
    const letter = bal?'—':(s.X>=50?a.plus.letter:a.minus.letter);
    const band = s.cell.band;
    const poleLabel = bal?tr().band[0]:(s.X>=50?a.plus.label[lang]:a.minus.label[lang]);
    return `<div class="sig-slot ${bal?'balanced':''}" style="--ax:${a.color}">
      <div class="ss-axis">${a.code}</div>
      <div class="ss-code"><b>${letter}</b>${bal?'':`<span>${band}</span>`}</div>
      <div class="ss-pole">${poleLabel}</div>
    </div>`;
  }).join('');
  const cards = S.axes.map(s=>{
    const a=AXIS_BY[s.code]; const bal=s.cell.pole==='0';
    const dominant = s.X>=50?a.plus:a.minus;
    const letter = bal?'~':dominant.letter;
    const bandName = tr().band[s.cell.band];
    // bar: 50 is center; fill from center toward the dominant side
    const half = Math.abs(s.X-50); // 0..50
    const widthPct = (half/50)*50;  // 0..50 (% of full bar)
    const leftPct = s.X>=50?50:(50-widthPct);
    const desc = lang==='ru'?(s.cell.ru||s.cell.en):s.cell.en;
    const framing = s.cell.framing ? (lang==='ru'?(s.cell.framing.ru||s.cell.framing.en):s.cell.framing.en) : '';
    return `<div class="axcard">
      <div class="axhead">
        <div class="axswatch" style="background:${a.color}">${letter}</div>
        <div><div class="axname">${a.name[lang]}</div>
          <div class="axmeta">${bal?tr().band[0]:(dominant.label[lang]+' · '+bandName+' · '+Math.round(s.X)+'/100')}</div></div>
      </div>
      <div class="axbar"><div class="mid"></div>
        <div class="fillpos" style="left:${leftPct}%;width:${widthPct}%;background:${a.color}"></div></div>
      <div class="axpoles"><b>${a.minus.label[lang]}</b><span>${a.name[lang]}</span><b>${a.plus.label[lang]}</b></div>
      <div class="axdesc">${esc(desc)}</div>
      ${framing?`<div class="axframing">${esc(framing)}</div>`:''}
    </div>`;
  }).join('');
  return `${topbar(false)}<div class="stage-wrap"><div class="wrap stage">
    <div class="res-hero">
      <div class="eyebrow">${t.res_eyebrow}</div>
      <div class="res-type">${typeHtml}</div>
      <div class="sig-inline">${sigInline}</div>
      <div class="radar-stage">${radar(S.axes)}</div>
    </div>
    <p class="note" style="margin-top:18px">${t.res_type_note}</p>
    <h2 style="margin-top:28px">${t.res_sig}</h2>
    <div class="sig-code" style="margin-top:14px">${slots}</div>
    <h2 style="margin-top:40px">${t.res_axes_heading}</h2>
    ${cards}
    <div class="btnrow"><button class="btn ghost" data-restart>${t.res_restart}</button></div>
    <p class="disc">${t.res_disclaimer}</p>
  </div></div>`;
}

function render(){
  document.documentElement.lang = lang;
  let html='';
  if(stage==='disclaimer') html=viewDisclaimer();
  else if(stage==='consent') html=viewConsent();
  else if(stage==='intake') html=viewIntake();
  else if(stage==='test') html=viewTest();
  else if(stage==='results') html=viewResults();
  // dev quick-fill (hidden on results)
  if(stage!=='results') html+=`<button class="devfill" data-devfill>${tr().devfill}</button>`;
  html+=`<div class="devnote">${tr().devnote}</div>`;
  app.innerHTML=html;
  wire();
}

function quickFill(){
  // Generate a *distinctive* profile per axis (not uniform random — that would
  // average to all-balanced because half the items are reverse-keyed). Pick a
  // random lean per axis, answer consistently toward it, add light jitter.
  const leans=[2,1,0,-1,-2];
  const clamp=r=>Math.max(1,Math.min(5,r));
  AXES.forEach(a=>{
    const dir=leans[Math.floor(Math.random()*leans.length)];
    QUESTIONS.filter(q=>q.axis===a.code).forEach(q=>{
      const base = 3 + (q.reverse ? -dir : dir);        // toward the chosen lean
      const jitter = Math.random()<0.25 ? (Math.random()<0.5?-1:1) : 0;
      responses[q.id]=clamp(base+jitter);
    });
  });
  go('results');
}

function wire(){
  app.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
  app.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));
  const dev=app.querySelector('[data-devfill]'); if(dev) dev.onclick=quickFill;

  const c=app.querySelector('#consent'); if(c) c.onchange=()=>{consent=c.checked; consentErr=false;};
  const cc=app.querySelector('[data-consent-continue]');
  if(cc) cc.onclick=()=>{ if(!consent){consentErr=true;render();return;} go('intake'); };

  app.querySelectorAll('[data-intake]').forEach(el=>{
    el.oninput=el.onchange=()=>{ intake[el.dataset.intake]=el.value; };
  });

  app.querySelectorAll('[data-answer]').forEach(b=>b.onclick=()=>{
    const q=ORDER[qi]; responses[q.id]=Number(b.dataset.answer);
    if(qi<ORDER.length-1){ qi++; }
    render();
  });
  app.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{
    qi=Math.min(ORDER.length-1,Math.max(0,qi+Number(b.dataset.nav))); render();
  });
  const fin=app.querySelector('[data-finish]'); if(fin) fin.onclick=()=>go('results');
  const rs=app.querySelector('[data-restart]'); if(rs) rs.onclick=()=>{
    stage='disclaimer'; qi=0; consent=false; consentErr=false;
    for(const k in responses) delete responses[k];
    render();
  };
}

render();
})();
